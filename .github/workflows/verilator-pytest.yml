name: Verilator Pytest

on:
  push:
  pull_request:

jobs:
  verilator-pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator python3-pytest

      - name: Build Verilator model
        run: make verilate

      - name: Run pytest
        run: pytest -v
